<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyStery Analytics</title>
<style>
:root {
--bg: #1F2121; --surface: #262828; --text: #F5F5F5; --text2: #A7A9A9;
--primary: #32B8C6; --primary2: #2DA6B2; --purple: #9333EA;
--green: #22C55E; --red: #FF5459; --orange: #E68161;
--border: rgba(119,124,124,0.3); --card: rgba(119,124,124,0.2);
--secondary: rgba(119,124,124,0.15); --secondary2: rgba(119,124,124,0.25);
--green-rgb: 34,197,94; --red-rgb: 255,84,89; --orange-rgb: 230,129,97;
--primary-rgb: 50,184,198;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:14px;background:var(--bg);color:var(--text);line-height:1.5;}
.wrap{max-width:1200px;margin:0 auto;padding:24px;}
h1{font-size:24px;font-weight:700;margin-bottom:8px;}
h1 span{color:var(--purple);}
.sub{color:var(--text2);margin-bottom:24px;}
.tabs{display:flex;gap:8px;border-bottom:2px solid var(--border);margin-bottom:24px;}
.tab{padding:12px 24px;background:none;border:none;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.tab-content{display:none;} .tab-content.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:24px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:16px;}
.group{display:flex;flex-direction:column;gap:8px;}
label{font-size:12px;font-weight:500;}
.hint{font-size:11px;color:var(--text2);}
input,select,textarea{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);font-family:inherit;width:100%;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--primary);border-color:var(--primary);}
textarea{min-height:80px;resize:vertical;}
hr{border:none;border-top:1px solid var(--border);margin:20px 0;}
.sec{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;}
.btn{padding:12px 24px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;}
.btn-p{background:var(--primary);color:#13343B;}
.btn-s{background:var(--secondary);color:var(--text);}
.btn-sm{padding:4px 12px;font-size:12px;}
table{width:100%;border-collapse:collapse;margin-top:16px;}
th{text-align:left;padding:12px;border-bottom:2px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);}
td{padding:10px 12px;border-bottom:1px solid var(--card);font-size:12px;}
tr:hover{background:var(--secondary);}
.badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;}
.b-call{background:rgba(var(--green-rgb),0.15);color:var(--green);border:1px solid rgba(var(--green-rgb),0.3);}
.b-put{background:rgba(var(--red-rgb),0.15);color:var(--red);border:1px solid rgba(var(--red-rgb),0.3);}
.b-open{background:rgba(var(--primary-rgb),0.15);color:var(--primary);border:1px solid rgba(var(--primary-rgb),0.3);}
.b-closed{background:rgba(119,124,124,0.15);color:var(--text2);border:1px solid rgba(119,124,124,0.3);}
.b-day{background:rgba(var(--orange-rgb),0.15);color:var(--orange);border:1px solid rgba(var(--orange-rgb),0.3);}
.b-swing{background:rgba(var(--green-rgb),0.1);color:var(--green);border:1px solid rgba(var(--green-rgb),0.25);}
.profit{color:var(--green);font-weight:600;} .loss{color:var(--red);font-weight:600;}
.actions{display:flex;gap:6px;flex-wrap:wrap;}
.empty{text-align:center;padding:32px;color:var(--text2);}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center;}
.slabel{font-size:12px;color:var(--text2);margin-bottom:8px;}
.sval{font-size:20px;font-weight:700;}
.filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.filters select{min-width:140px;width:auto;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:12px 24px;border-radius:12px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
#import-input{display:none;}
.edit-badge{font-size:12px;color:var(--orange);margin-left:8px;}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--surface);border-radius:12px;padding:24px;max-width:480px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-box h2{color:var(--primary);margin-bottom:16px;}
.drow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.dlabel{color:var(--text2);font-size:13px;}
.dval{font-weight:600;font-size:13px;}
.dblock{margin-top:14px;}
.dblock strong{display:block;margin-bottom:6px;}
.dtext{padding:10px 12px;background:var(--secondary);border-radius:8px;font-size:13px;color:var(--text);}
@media(max-width:768px){.grid{grid-template-columns:1fr 1fr;}.stats{grid-template-columns:1fr 1fr;}th,td{padding:8px;}}
@media(max-width:480px){.grid{grid-template-columns:1fr;}.actions{flex-direction:column;}}
</style>
</head>
<body>
<div class="wrap">
<h1>Options Trade Logger <span>MyStery Analytics</span></h1>
<p class="sub">Track and analyze your directional options trades</p>

<div class="tabs">
<button class="tab active" id="tab-new-trade" onclick="switchTab('new-trade')">New Trade</button>
<button class="tab" id="tab-trades" onclick="switchTab('trades')">My Trades</button>
<button class="tab" id="tab-analytics" onclick="switchTab('analytics')">Analytics</button>
</div>

<div id="new-trade" class="tab-content active">
<div class="card">
<h2 style="font-size:18px;margin-bottom:20px;">Log New Trade <span class="edit-badge" id="edit-indicator"></span></h2>
<form id="tradeForm">
<p class="sec">Trade Setup</p>
<div class="grid">
<div class="group"><label>Ticker *</label><input type="text" id="ticker" required placeholder="AAPL, TSLA..."></div>
<div class="group"><label>Option Type *</label>
<select id="option-type" required onchange="updateDeltaHint()">
<option value="">Select...</option>
<option value="call">Long Call</option>
<option value="put">Long Put</option>
</select></div>
<div class="group"><label>Strike Price *</label><input type="number" id="strike" step="0.01" required placeholder="150.00"></div>
<div class="group"><label>Expiration Date *</label><input type="date" id="expiry" required></div>
<div class="group"><label>Contracts *</label><input type="number" id="contracts" min="1" required placeholder="1"></div>
<div class="group"><label>Status</label>
<select id="status">
<option value="open">Open</option>
<option value="closed">Closed</option>
</select></div>
</div>
<hr>
<p class="sec">Entry</p>
<div class="grid">
<div class="group"><label>Entry Date *</label><input type="date" id="entry-date" required></div>
<div class="group"><label>Option Entry Price *</label><input type="number" id="entry-price" step="0.01" required placeholder="2.50"></div>
<div class="group"><label>Stock Price at Entry *</label><input type="number" id="stock-price-entry" step="0.01" required placeholder="148.50"></div>
<div class="group"><label>Commissions ($)</label><input type="number" id="fees" step="0.01" value="0" placeholder="0.65"></div>
</div>
<hr>
<p class="sec">Greeks at Entry</p>
<div class="grid">
<div class="group"><label>Delta <span class="hint" id="delta-hint">(negative OK for puts)</span></label><input type="number" id="delta" step="0.01" placeholder="-0.45"></div>
<div class="group"><label>Theta <span class="hint">(daily decay)</span></label><input type="number" id="theta" step="0.001" placeholder="-0.05"></div>
</div>
<hr>
<p class="sec">Risk Management</p>
<div class="grid">
<div class="group"><label>Stop Loss / Invalidation <span class="hint">(stock price)</span></label><input type="number" id="stop-loss" step="0.01" placeholder="142.00"></div>
</div>
<hr>
<p class="sec">Exit</p>
<div class="grid">
<div class="group"><label>Option Exit Price</label><input type="number" id="exit-price" step="0.01" placeholder="3.80"></div>
<div class="group"><label>Exit Date</label><input type="date" id="exit-date"></div>
</div>
<hr>
<p class="sec">Analysis</p>
<div class="group" style="margin-bottom:16px;"><label>Trade Thesis</label><textarea id="thesis" placeholder="Why this trade? What is your setup?"></textarea></div>
<div class="group"><label>Notes / Lessons Learned</label><textarea id="notes" placeholder="Post-trade notes and learnings..."></textarea></div>
<div style="display:flex;gap:8px;margin-top:20px">
<button type="submit" class="btn btn-p" id="save-btn">Save Trade</button>
<button type="button" class="btn btn-s" onclick="cancelEdit()">Cancel</button>
</div>
</form>
</div>
</div>

<div id="trades" class="tab-content">
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
<h2 style="font-size:18px;">Trade History</h2>
<div style="display:flex;gap:8px">
<input type="file" id="import-input" accept=".csv" style="display:none" onchange="importCSV(event)">
<button class="btn btn-s btn-sm" onclick="document.getElementById('import-input').click()">Import CSV</button>
<button class="btn btn-s btn-sm" onclick="exportTrades()">Export CSV</button>
</div>
</div>
<div class="filters">
<select id="filter-status" onchange="renderTrades()">
<option value="all">All statuses</option>
<option value="open">Open</option>
<option value="closed">Closed</option>
</select>
<select id="filter-type" onchange="renderTrades()">
<option value="all">Calls & Puts</option>
<option value="call">Long Calls only</option>
<option value="put">Long Puts only</option>
</select>
</div>
<div id="trades-list"></div>
</div>
</div>

<div id="analytics" class="tab-content">
<div class="card">
<h2 style="font-size:18px;margin-bottom:20px;">Trading Statistics</h2>
<div class="stats" id="stats-grid"></div>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
var trades = [];
var editingId = null;

function toast(msg) {
var t = document.getElementById('toast');
t.textContent = msg;
t.classList.add('show');
setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

function loadTrades() {
try { trades = JSON.parse(localStorage.getItem('mystery_trades') || '[]'); }
catch(e) { trades = []; }
}

function saveTrades() {
localStorage.setItem('mystery_trades', JSON.stringify(trades));
}

function updateDeltaHint() {
var type = document.getElementById('option-type').value;
var d = document.getElementById('delta');
var h = document.getElementById('delta-hint');
if (type === 'call') { d.placeholder = '0.45'; h.textContent = '(positive for calls)'; }
else if (type === 'put') { d.placeholder = '-0.45'; h.textContent = '(negative for puts)'; }
else { d.placeholder = 'Delta'; h.textContent = '(negative OK for puts)'; }
}

function switchTab(name) {
document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
document.querySelectorAll('.tab-content').forEach(function(c){ c.classList.remove('active'); });
document.getElementById('tab-' + name).classList.add('active');
document.getElementById(name).classList.add('active');
if (name === 'trades') renderTrades();
if (name === 'analytics') renderAnalytics();
if (editingId !== null && name !== 'new-trade') cancelEdit();
}

function cancelEdit() {
editingId = null;
document.getElementById('edit-indicator').textContent = '';
document.getElementById('save-btn').textContent = 'Save Trade';
document.getElementById('tradeForm').reset();
document.getElementById('entry-date').valueAsDate = new Date();
}

document.getElementById('tradeForm').addEventListener('submit', function(e) {
e.preventDefault();
var trade = {
id: editingId || Date.now(),
ticker: document.getElementById('ticker').value.toUpperCase().trim(),
optionType: document.getElementById('option-type').value,
strike: parseFloat(document.getElementById('strike').value),
expiry: document.getElementById('expiry').value,
contracts: parseInt(document.getElementById('contracts').value),
entryDate: document.getElementById('entry-date').value,
entryPrice: parseFloat(document.getElementById('entry-price').value),
stockPriceEntry: document.getElementById('stock-price-entry').value ? parseFloat(document.getElementById('stock-price-entry').value) : null,
fees: parseFloat(document.getElementById('fees').value) || 0,
delta: document.getElementById('delta').value !== '' ? parseFloat(document.getElementById('delta').value) : null,
theta: document.getElementById('theta').value !== '' ? parseFloat(document.getElementById('theta').value) : null,
stopLoss: document.getElementById('stop-loss').value ? parseFloat(document.getElementById('stop-loss').value) : null,
exitPrice: document.getElementById('exit-price').value ? parseFloat(document.getElementById('exit-price').value) : null,
exitDate: document.getElementById('exit-date').value || null,
status: document.getElementById('status').value,
thesis: document.getElementById('thesis').value,
notes: document.getElementById('notes').value
};
if (editingId !== null) {
for (var i = 0; i < trades.length; i++) { if (trades[i].id === editingId) { trades[i] = trade; break; } }
toast('Trade updated!');
} else {
trades.push(trade);
toast('Trade saved!');
}
saveTrades();
cancelEdit();
if (document.getElementById('trades').classList.contains('active')) renderTrades();
});

function pnl(trade) {
if (!trade.exitPrice) return null;
return (trade.exitPrice - trade.entryPrice) * trade.contracts * 100 - trade.fees;
}

function duration(entry, exit) {
if (!exit) return { label: 'Open', cls: 'b-open' };
var days = Math.round((new Date(exit) - new Date(entry)) / 86400000);
if (days <= 0) return { label: 'Day', cls: 'b-day' };
return { label: days + 'd Swing', cls: 'b-swing' };
}

function renderTrades() {
var c = document.getElementById('trades-list');
if (trades.length === 0) { c.innerHTML = '<div class="empty">No trades yet. Log your first trade!</div>'; return; }
var sf = document.getElementById('filter-status').value;
var tf = document.getElementById('filter-type').value;
var list = trades.filter(function(t) {
if (sf !== 'all' && t.status !== sf) return false;
if (tf !== 'all' && t.optionType !== tf) return false;
return true;
});
if (list.length === 0) { c.innerHTML = '<div class="empty">No trades match filters.</div>'; return; }
var html = '<table><thead><tr><th>Date</th><th>Ticker</th><th>Type</th><th>Strike</th><th>Exp</th><th>Qty</th><th>Stock</th><th>Entry</th><th>Exit</th><th>Delta</th><th>Theta</th><th>Stop</th><th>P&L</th><th>Duration</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
for (var i = 0; i < list.length; i++) {
var tr = list[i];
var p = pnl(tr);
var pClass = p !== null ? (p > 0 ? 'profit' : 'loss') : '';
var pText = p !== null ? '$' + p.toFixed(2) : '-';
var dur = duration(tr.entryDate, tr.exitDate);
var stClass = tr.status === 'open' ? 'b-open' : 'b-closed';
var stLabel = tr.status === 'open' ? 'Open' : 'Closed';
html += '<tr>' +
'<td>' + tr.entryDate + '</td>' +
'<td><strong>' + tr.ticker + '</strong></td>' +
'<td><span class="badge ' + (tr.optionType === 'call' ? 'b-call' : 'b-put') + '">' + (tr.optionType === 'call' ? 'CALL' : 'PUT') + '</span></td>' +
'<td>$' + tr.strike.toFixed(2) + '</td>' +
'<td>' + tr.expiry + '</td>' +
'<td>' + tr.contracts + '</td>' +
'<td>' + (tr.stockPriceEntry ? '$' + tr.stockPriceEntry.toFixed(2) : '-') + '</td>' +
'<td>$' + tr.entryPrice.toFixed(2) + '</td>' +
'<td>' + (tr.exitPrice ? '$' + tr.exitPrice.toFixed(2) : '-') + '</td>' +
'<td>' + (tr.delta !== null ? tr.delta : '-') + '</td>' +
'<td>' + (tr.theta !== null ? tr.theta : '-') + '</td>' +
'<td>' + (tr.stopLoss ? '$' + tr.stopLoss.toFixed(2) : '-') + '</td>' +
'<td class="' + pClass + '">' + pText + '</td>' +
'<td><span class="badge ' + dur.cls + '">' + dur.label + '</span></td>' +
'<td><span class="badge ' + stClass + '">' + stLabel + '</span></td>' +
'<td><div class="actions">' +
'<button class="btn btn-s btn-sm" onclick="editTrade(' + tr.id + ')">Edit</button>' +
'<button class="btn btn-s btn-sm" onclick="viewDetails(' + tr.id + ')">Details</button>' +
'<button class="btn btn-s btn-sm" onclick="deleteTrade(' + tr.id + ')">Delete</button>' +
'</div></td></tr>';
}
html += '</tbody></table>';
c.innerHTML = html;
}

function editTrade(id) {
var trade = trades.find(function(t){ return t.id === id; });
if (!trade) return;
editingId = id;
document.getElementById('edit-indicator').textContent = '(Editing: ' + trade.ticker + ')';
document.getElementById('save-btn').textContent = 'Update Trade';
document.getElementById('ticker').value = trade.ticker;
document.getElementById('option-type').value = trade.optionType;
document.getElementById('strike').value = trade.strike;
document.getElementById('expiry').value = trade.expiry;
document.getElementById('contracts').value = trade.contracts;
document.getElementById('status').value = trade.status;
document.getElementById('entry-date').value = trade.entryDate;
document.getElementById('entry-price').value = trade.entryPrice;
document.getElementById('stock-price-entry').value = trade.stockPriceEntry || '';
document.getElementById('fees').value = trade.fees;
document.getElementById('delta').value = trade.delta !== null ? trade.delta : '';
document.getElementById('theta').value = trade.theta !== null ? trade.theta : '';
document.getElementById('stop-loss').value = trade.stopLoss !== null ? trade.stopLoss : '';
document.getElementById('exit-price').value = trade.exitPrice !== null ? trade.exitPrice : '';
document.getElementById('exit-date').value = trade.exitDate || '';
document.getElementById('thesis').value = trade.thesis || '';
document.getElementById('notes').value = trade.notes || '';
updateDeltaHint();
switchTab('new-trade');
}

function viewDetails(id) {
var tr = trades.find(function(t){ return t.id === id; });
if (!tr) return;
var p = pnl(tr);
var pClass = p !== null ? (p > 0 ? 'profit' : 'loss') : '';
var pText = p !== null ? '$' + p.toFixed(2) : 'N/A';
var dur = duration(tr.entryDate, tr.exitDate);
var stClass = tr.status === 'open' ? 'b-open' : 'b-closed';

var box = document.createElement('div');
box.className = 'modal-overlay';
box.innerHTML = '<div class="modal-box">' +
'<h2>📊 ' + tr.ticker + ' — Trade Details</h2>' +
'<div class="drow"><span class="dlabel">Type</span><span class="dval"><span class="badge ' + (tr.optionType === 'call' ? 'b-call' : 'b-put') + '">' + (tr.optionType === 'call' ? 'Long Call' : 'Long Put') + '</span></span></div>' +
'<div class="drow"><span class="dlabel">Strike</span><span class="dval">$' + tr.strike.toFixed(2) + '</span></div>' +
'<div class="drow"><span class="dlabel">Expiration</span><span class="dval">' + tr.expiry + '</span></div>' +
'<div class="drow"><span class="dlabel">Contracts</span><span class="dval">' + tr.contracts + '</span></div>' +
'<div class="drow"><span class="dlabel">Stock Entry</span><span class="dval">' + (tr.stockPriceEntry ? '$' + tr.stockPriceEntry.toFixed(2) : 'N/A') + '</span></div>' +
'<div class="drow"><span class="dlabel">Option Entry</span><span class="dval">$' + tr.entryPrice.toFixed(2) + ' (' + tr.entryDate + ')</span></div>' +
'<div class="drow"><span class="dlabel">Option Exit</span><span class="dval">' + (tr.exitPrice ? '$' + tr.exitPrice.toFixed(2) + ' (' + tr.exitDate + ')' : 'Still Open') + '</span></div>' +
'<div class="drow"><span class="dlabel">P&L</span><span class="dval ' + pClass + '">' + pText + '</span></div>' +
'<div class="drow"><span class="dlabel">Duration</span><span class="dval"><span class="badge ' + dur.cls + '">' + dur.label + '</span></span></div>' +
'<div class="drow"><span class="dlabel">Delta</span><span class="dval">' + (tr.delta !== null ? tr.delta : 'N/A') + '</span></div>' +
'<div class="drow"><span class="dlabel">Theta</span><span class="dval">' + (tr.theta !== null ? tr.theta : 'N/A') + '</span></div>' +
'<div class="drow"><span class="dlabel">Stop Loss</span><span class="dval">' + (tr.stopLoss ? '$' + tr.stopLoss.toFixed(2) : 'N/A') + '</span></div>' +
'<div class="drow"><span class="dlabel">Status</span><span class="dval"><span class="badge ' + stClass + '">' + (tr.status === 'open' ? 'Open' : 'Closed') + '</span></span></div>' +
'<div class="dblock"><strong>Thesis:</strong><div class="dtext">' + (tr.thesis || 'N/A') + '</div></div>' +
'<div class="dblock"><strong>Notes:</strong><div class="dtext">' + (tr.notes || 'N/A') + '</div></div>' +
'<button onclick="document.querySelector('.modal-overlay').remove()" style="margin-top:20px;width:100%;padding:12px;background:var(--primary);color:#13343B;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;">Close</button>' +
'</div>';
document.body.appendChild(box);
}

function deleteTrade(id) {
if (confirm('Delete this trade?')) {
trades = trades.filter(function(t){ return t.id !== id; });
saveTrades(); renderTrades(); toast('Trade deleted.');
}
}

function renderAnalytics() {
var c = document.getElementById('stats-grid');
if (trades.length === 0) { c.innerHTML = '<div class="empty" style="grid-column:1/-1">No data yet. Log trades first!</div>'; return; }
var closed = trades.filter(function(t){ return t.status === 'closed' && t.exitPrice; });
var openCount = trades.filter(function(t){ return t.status === 'open'; }).length;
var calls = trades.filter(function(t){ return t.optionType === 'call'; }).length;
var puts = trades.filter(function(t){ return t.optionType === 'put'; }).length;
var days = trades.filter(function(t){ var d = duration(t.entryDate, t.exitDate); return d.label === 'Day'; }).length;
var swings = trades.filter(function(t){ var d = duration(t.entryDate, t.exitDate); return d.label.includes('Swing'); }).length;
var totalPnL = 0, winners = 0, losers = 0, totalWin = 0, totalLoss = 0;
for (var i = 0; i < closed.length; i++) {
var p = pnl(closed[i]);
if (p !== null) {
totalPnL += p;
if (p > 0) { winners++; totalWin += p; }
else if (p < 0) { losers++; totalLoss += Math.abs(p); }
}
}
var wr = closed.length > 0 ? ((winners / closed.length) * 100).toFixed(1) : '0.0';
var avgW = winners > 0 ? '$' + (totalWin / winners).toFixed(2) : '-';
var avgL = losers > 0 ? '$' + (totalLoss / losers).toFixed(2) : '-';
var pf = totalLoss > 0 ? (totalWin / totalLoss).toFixed(2) : '-';
var pClass = totalPnL > 0 ? 'profit' : (totalPnL < 0 ? 'loss' : '');
c.innerHTML =
'<div class="stat"><div class="slabel">Total Trades</div><div class="sval">' + trades.length + '</div></div>' +
'<div class="stat"><div class="slabel">Open</div><div class="sval">' + openCount + '</div></div>' +
'<div class="stat"><div class="slabel">Closed</div><div class="sval">' + closed.length + '</div></div>' +
'<div class="stat"><div class="slabel">Total P&L</div><div class="sval ' + pClass + '">$' + totalPnL.toFixed(2) + '</div></div>' +
'<div class="stat"><div class="slabel">Win Rate</div><div class="sval">' + wr + '%</div></div>' +
'<div class="stat"><div class="slabel">Winners / Losers</div><div class="sval">' + winners + ' / ' + losers + '</div></div>' +
'<div class="stat"><div class="slabel">Avg Win</div><div class="sval profit">' + avgW + '</div></div>' +
'<div class="stat"><div class="slabel">Avg Loss</div><div class="sval loss">' + avgL + '</div></div>' +
'<div class="stat"><div class="slabel">Profit Factor</div><div class="sval">' + pf + '</div></div>' +
'<div class="stat"><div class="slabel">Long Calls</div><div class="sval">' + calls + '</div></div>' +
'<div class="stat"><div class="slabel">Long Puts</div><div class="sval">' + puts + '</div></div>' +
'<div class="stat"><div class="slabel">Day Trades</div><div class="sval">' + days + '</div></div>' +
'<div class="stat"><div class="slabel">Swing Trades</div><div class="sval">' + swings + '</div></div>';
}

function parseCSVLine(line) {
var result = [], field = '', inQ = false;
for (var i = 0; i < line.length; i++) {
var ch = line[i];
if (ch === '"') { inQ = !inQ; }
else if (ch === ',' && !inQ) { result.push(field.trim()); field = ''; }
else { field += ch; }
}
result.push(field.trim());
return result;
}

function importCSV(event) {
var file = event.target.files[0];
if (!file) return;
var reader = new FileReader();
reader.onload = function(e) {
var lines = e.target.result.split('\n');
if (lines.length < 2) { toast('Invalid CSV'); return; }
var added = 0, updated = 0;
for (var i = 1; i < lines.length; i++) {
var line = lines[i].trim();
if (!line) continue;
var row = parseCSVLine(line);
if (row.length < 16) continue;
var trade = {
id: parseInt(row[0]) || Date.now() + i,
entryDate: row[1], ticker: row[2].toUpperCase(),
optionType: row[3].toLowerCase().includes('call') ? 'call' : 'put',
strike: parseFloat(row[4]) || 0, expiry: row[5],
contracts: parseInt(row[6]) || 1,
stockPriceEntry: parseFloat(row[7]) || null,
entryPrice: parseFloat(row[8]) || 0,
exitPrice: parseFloat(row[9]) || null,
exitDate: row[10] || null,
fees: parseFloat(row[11]) || 0,
delta: row[13] !== '' ? parseFloat(row[13]) : null,
theta: row[14] !== '' ? parseFloat(row[14]) : null,
stopLoss: parseFloat(row[15]) || null,
status: row[16] || 'open',
thesis: row[17] || '', notes: row[18] || ''
};
var found = false;
for (var j = 0; j < trades.length; j++) {
if (trades[j].id === trade.id) { trades[j] = trade; updated++; found = true; break; }
}
if (!found) { trades.push(trade); added++; }
}
saveTrades(); renderTrades(); event.target.value = '';
toast('Added: ' + added + ', Updated: ' + updated);
};
reader.readAsText(file);
}

function exportTrades() {
if (trades.length === 0) { toast('No trades to export.'); return; }
var csv = 'ID,Entry Date,Ticker,Type,Strike,Expiration,Contracts,Stock Price Entry,Option Entry,Option Exit,Exit Date,Commissions,PnL,Delta,Theta,Stop Loss,Status,Thesis,Notes\n';
for (var i = 0; i < trades.length; i++) {
var t = trades[i], p = pnl(t);
csv += [t.id, t.entryDate, t.ticker, t.optionType === 'call' ? 'Long Call' : 'Long Put',
t.strike, t.expiry, t.contracts, t.stockPriceEntry || '',
t.entryPrice, t.exitPrice || '', t.exitDate || '', t.fees,
p !== null ? p.toFixed(2) : '',
t.delta !== null ? t.delta : '', t.theta !== null ? t.theta : '',
t.stopLoss || '', t.status,
'"' + (t.thesis||'').replace(/"/g,'""') + '"',
'"' + (t.notes||'').replace(/"/g,'""') + '"'].join(',') + '\n';
}
var a = document.createElement('a');
a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
a.download = 'mystery_trades_' + new Date().toISOString().split('T')[0] + '.csv';
a.click();
}

loadTrades();
document.getElementById('entry-date').valueAsDate = new Date();
</script>
