<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options Trade Logger</title>
    <style>
        :root {
            --color-white: rgba(255, 255, 255, 1);
            --color-black: rgba(0, 0, 0, 1);
            --color-cream-50: rgba(252, 252, 249, 1);
            --color-cream-100: rgba(255, 255, 253, 1);
            --color-gray-200: rgba(245, 245, 245, 1);
            --color-gray-300: rgba(167, 169, 169, 1);
            --color-gray-400: rgba(119, 124, 124, 1);
            --color-slate-500: rgba(98, 108, 113, 1);
            --color-brown-600: rgba(94, 82, 64, 1);
            --color-charcoal-700: rgba(31, 33, 33, 1);
            --color-charcoal-800: rgba(38, 40, 40, 1);
            --color-slate-900: rgba(19, 52, 59, 1);
            --color-teal-300: rgba(50, 184, 198, 1);
            --color-teal-400: rgba(45, 166, 178, 1);
            --color-teal-500: rgba(33, 128, 141, 1);
            --color-teal-600: rgba(29, 116, 128, 1);
            --color-teal-700: rgba(26, 104, 115, 1);
            --color-teal-800: rgba(41, 150, 161, 1);
            --color-red-400: rgba(255, 84, 89, 1);
            --color-red-500: rgba(192, 21, 47, 1);
            --color-orange-400: rgba(230, 129, 97, 1);
            --color-orange-500: rgba(168, 75, 47, 1);
            --color-brown-600-rgb: 94, 82, 64;
            --color-teal-500-rgb: 33, 128, 141;
            --color-slate-900-rgb: 19, 52, 59;
            --color-slate-500-rgb: 98, 108, 113;
            --color-red-500-rgb: 192, 21, 47;
            --color-red-400-rgb: 255, 84, 89;
            --color-orange-500-rgb: 168, 75, 47;
            --color-orange-400-rgb: 230, 129, 97;
            --color-bg-1: rgba(59, 130, 246, 0.08);
            --color-bg-2: rgba(245, 158, 11, 0.08);
            --color-bg-3: rgba(34, 197, 94, 0.08);
            --color-bg-4: rgba(239, 68, 68, 0.08);
            --color-bg-5: rgba(147, 51, 234, 0.08);
            --color-bg-6: rgba(249, 115, 22, 0.08);
            --color-bg-7: rgba(236, 72, 153, 0.08);
            --color-bg-8: rgba(6, 182, 212, 0.08);
            --color-background: var(--color-cream-50);
            --color-surface: var(--color-cream-100);
            --color-text: var(--color-slate-900);
            --color-text-secondary: var(--color-slate-500);
            --color-primary: var(--color-teal-500);
            --color-primary-hover: var(--color-teal-600);
            --color-primary-active: var(--color-teal-700);
            --color-secondary: rgba(var(--color-brown-600-rgb), 0.12);
            --color-secondary-hover: rgba(var(--color-brown-600-rgb), 0.2);
            --color-secondary-active: rgba(var(--color-brown-600-rgb), 0.25);
            --color-border: rgba(var(--color-brown-600-rgb), 0.2);
            --color-btn-primary-text: var(--color-cream-50);
            --color-card-border: rgba(var(--color-brown-600-rgb), 0.12);
            --color-card-border-inner: rgba(var(--color-brown-600-rgb), 0.12);
            --color-error: var(--color-red-500);
            --color-success: var(--color-teal-500);
            --color-warning: var(--color-orange-500);
            --color-info: var(--color-slate-500);
            --color-focus-ring: rgba(var(--color-teal-500-rgb), 0.4);
            --color-select-caret: rgba(var(--color-slate-900-rgb), 0.8);
            --focus-ring: 0 0 0 3px var(--color-focus-ring);
            --focus-outline: 2px solid var(--color-primary);
            --status-bg-opacity: 0.15;
            --status-border-opacity: 0.25;
            --color-success-rgb: 33, 128, 141;
            --color-error-rgb: 192, 21, 47;
            --color-warning-rgb: 168, 75, 47;
            --color-info-rgb: 98, 108, 113;
            --font-family-base: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-size-xs: 11px;
            --font-size-sm: 12px;
            --font-size-base: 14px;
            --font-size-lg: 16px;
            --font-size-xl: 18px;
            --font-size-2xl: 20px;
            --font-size-3xl: 24px;
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 550;
            --font-weight-bold: 600;
            --space-4: 4px;
            --space-8: 8px;
            --space-12: 12px;
            --space-16: 16px;
            --space-20: 20px;
            --space-24: 24px;
            --radius-base: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.04), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-gray-400-rgb: 119, 124, 124;
                --color-teal-300-rgb: 50, 184, 198;
                --color-gray-300-rgb: 167, 169, 169;
                --color-gray-200-rgb: 245, 245, 245;
                --color-bg-1: rgba(29, 78, 216, 0.15);
                --color-bg-2: rgba(180, 83, 9, 0.15);
                --color-bg-3: rgba(21, 128, 61, 0.15);
                --color-bg-4: rgba(185, 28, 28, 0.15);
                --color-bg-5: rgba(107, 33, 168, 0.15);
                --color-bg-6: rgba(194, 65, 12, 0.15);
                --color-bg-7: rgba(190, 24, 93, 0.15);
                --color-bg-8: rgba(8, 145, 178, 0.15);
                --color-background: var(--color-charcoal-700);
                --color-surface: var(--color-charcoal-800);
                --color-text: var(--color-gray-200);
                --color-text-secondary: rgba(var(--color-gray-300-rgb), 0.7);
                --color-primary: var(--color-teal-300);
                --color-primary-hover: var(--color-teal-400);
                --color-primary-active: var(--color-teal-800);
                --color-secondary: rgba(var(--color-gray-400-rgb), 0.15);
                --color-secondary-hover: rgba(var(--color-gray-400-rgb), 0.25);
                --color-secondary-active: rgba(var(--color-gray-400-rgb), 0.3);
                --color-border: rgba(var(--color-gray-400-rgb), 0.3);
                --color-error: var(--color-red-400);
                --color-success: var(--color-teal-300);
                --color-warning: var(--color-orange-400);
                --color-info: var(--color-gray-300);
                --color-focus-ring: rgba(var(--color-teal-300-rgb), 0.4);
                --color-btn-primary-text: var(--color-slate-900);
                --color-card-border: rgba(var(--color-gray-400-rgb), 0.2);
                --color-card-border-inner: rgba(var(--color-gray-400-rgb), 0.15);
                --color-border-secondary: rgba(var(--color-gray-400-rgb), 0.2);
                --color-select-caret: rgba(var(--color-gray-200-rgb), 0.8);
                --color-success-rgb: var(--color-teal-300-rgb);
                --color-error-rgb: var(--color-red-400-rgb);
                --color-warning-rgb: var(--color-orange-400-rgb);
                --color-info-rgb: var(--color-gray-300-rgb);
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family-base);
            font-size: var(--font-size-base);
            background-color: var(--color-background);
            color: var(--color-text);
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--space-24);
        }

        header {
            margin-bottom: var(--space-24);
        }

        h1 {
            font-size: var(--font-size-3xl);
            font-weight: var(--font-weight-bold);
            margin-bottom: var(--space-8);
            color: var(--color-text);
        }

        .subtitle {
            color: var(--color-text-secondary);
            font-size: var(--font-size-base);
        }

        .tabs {
            display: flex;
            gap: var(--space-8);
            margin-bottom: var(--space-24);
            border-bottom: 2px solid var(--color-border);
        }

        .tab {
            padding: var(--space-12) var(--space-24);
            background: none;
            border: none;
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            color: var(--color-text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
        }

        .tab:hover {
            color: var(--color-text);
        }

        .tab.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: var(--color-surface);
            border: 1px solid var(--color-card-border);
            border-radius: var(--radius-lg);
            padding: var(--space-24);
            margin-bottom: var(--space-24);
            box-shadow: var(--shadow-sm);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--space-16);
            margin-bottom: var(--space-16);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-8);
        }

        label {
            font-size: var(--font-size-sm);
            font-weight: var(--font-weight-medium);
            color: var(--color-text);
        }

        input, select, textarea {
            padding: var(--space-8) var(--space-12);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-base);
            font-size: var(--font-size-base);
            background: var(--color-surface);
            color: var(--color-text);
            font-family: var(--font-family-base);
        }

        input:focus, select:focus, textarea:focus {
            outline: var(--focus-outline);
            border-color: var(--color-primary);
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        .btn {
            padding: var(--space-12) var(--space-24);
            border: none;
            border-radius: var(--radius-base);
            font-size: var(--font-size-base);
            font-weight: var(--font-weight-medium);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--color-primary);
            color: var(--color-btn-primary-text);
        }

        .btn-primary:hover {
            background: var(--color-primary-hover);
        }

        .btn-secondary {
            background: var(--color-secondary);
            color: var(--color-text);
        }

        .btn-secondary:hover {
            background: var(--color-secondary-hover);
        }

        .btn-small {
            padding: var(--space-4) var(--space-12);
            font-size: var(--font-size-sm);
        }

        .trades-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: var(--space-16);
        }

        .trades-table th {
            text-align: left;
            padding: var(--space-12);
            border-bottom: 2px solid var(--color-border);
            font-weight: var(--font-weight-semibold);
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
        }

        .trades-table td {
            padding: var(--space-12);
            border-bottom: 1px solid var(--color-card-border);
            font-size: var(--font-size-sm);
        }

        .trades-table tr:hover {
            background: var(--color-secondary);
        }

        .badge {
            display: inline-block;
            padding: var(--space-4) var(--space-8);
            border-radius: var(--radius-base);
            font-size: var(--font-size-xs);
            font-weight: var(--font-weight-medium);
        }

        .badge-call {
            background: rgba(var(--color-success-rgb), var(--status-bg-opacity));
            color: var(--color-success);
            border: 1px solid rgba(var(--color-success-rgb), var(--status-border-opacity));
        }

        .badge-put {
            background: rgba(var(--color-error-rgb), var(--status-bg-opacity));
            color: var(--color-error);
            border: 1px solid rgba(var(--color-error-rgb), var(--status-border-opacity));
        }

        .badge-open {
            background: rgba(var(--color-info-rgb), var(--status-bg-opacity));
            color: var(--color-info);
            border: 1px solid rgba(var(--color-info-rgb), var(--status-border-opacity));
        }

        .badge-closed {
            background: var(--color-secondary);
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border);
        }

        .profit {
            color: var(--color-success);
            font-weight: var(--font-weight-semibold);
        }

        .loss {
            color: var(--color-error);
            font-weight: var(--font-weight-semibold);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-16);
        }

        .stat-card {
            background: var(--color-surface);
            border: 1px solid var(--color-card-border);
            border-radius: var(--radius-lg);
            padding: var(--space-20);
            text-align: center;
        }

        .stat-label {
            font-size: var(--font-size-sm);
            color: var(--color-text-secondary);
            margin-bottom: var(--space-8);
        }

        .stat-value {
            font-size: var(--font-size-2xl);
            font-weight: var(--font-weight-bold);
            color: var(--color-text);
        }

        .action-buttons {
            display: flex;
            gap: var(--space-8);
        }

        .empty-state {
            text-align: center;
            padding: var(--space-24);
            color: var(--color-text-secondary);
        }

        .filter-bar {
            display: flex;
            gap: var(--space-12);
            margin-bottom: var(--space-16);
            flex-wrap: wrap;
        }

        .filter-bar select {
            min-width: 150px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .trades-table {
                font-size: var(--font-size-xs);
            }

            .trades-table th,
            .trades-table td {
                padding: var(--space-8);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Options Trade Logger</h1>
            <p class="subtitle">Registra y analiza tus operaciones de opciones</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('new-trade')">Nueva Operación</button>
            <button class="tab" onclick="switchTab('trades')">Mis Operaciones</button>
            <button class="tab" onclick="switchTab('analytics')">Analíticas</button>
        </div>

        <div id="new-trade" class="tab-content active">
            <div class="card">
                <h2 style="margin-bottom: var(--space-20); font-size: var(--font-size-xl);">Registrar Nueva Operación</h2>
                <form id="tradeForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="ticker">Ticker *</label>
                            <input type="text" id="ticker" required placeholder="AAPL, TSLA, SPY...">
                        </div>
                        <div class="form-group">
                            <label for="option-type">Tipo *</label>
                            <select id="option-type" required>
                                <option value="">Seleccionar...</option>
                                <option value="call">Call</option>
                                <option value="put">Put</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="strategy">Estrategia</label>
                            <select id="strategy">
                                <option value="">Seleccionar...</option>
                                <option value="long-call">Long Call</option>
                                <option value="long-put">Long Put</option>
                                <option value="short-call">Short Call (Covered)</option>
                                <option value="short-put">Short Put (Cash Secured)</option>
                                <option value="vertical">Vertical Spread</option>
                                <option value="iron-condor">Iron Condor</option>
                                <option value="butterfly">Butterfly</option>
                                <option value="straddle">Straddle</option>
                                <option value="strangle">Strangle</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="strike">Strike *</label>
                            <input type="number" id="strike" step="0.01" required placeholder="150.00">
                        </div>
                        <div class="form-group">
                            <label for="expiry">Fecha de Expiración *</label>
                            <input type="date" id="expiry" required>
                        </div>
                        <div class="form-group">
                            <label for="contracts">Contratos *</label>
                            <input type="number" id="contracts" min="1" required placeholder="1">
                        </div>
                        <div class="form-group">
                            <label for="entry-price">Precio de Entrada *</label>
                            <input type="number" id="entry-price" step="0.01" required placeholder="2.50">
                        </div>
                        <div class="form-group">
                            <label for="entry-date">Fecha de Entrada *</label>
                            <input type="date" id="entry-date" required>
                        </div>
                        <div class="form-group">
                            <label for="exit-price">Precio de Salida</label>
                            <input type="number" id="exit-price" step="0.01" placeholder="3.00">
                        </div>
                        <div class="form-group">
                            <label for="exit-date">Fecha de Salida</label>
                            <input type="date" id="exit-date">
                        </div>
                        <div class="form-group">
                            <label for="fees">Comisiones</label>
                            <input type="number" id="fees" step="0.01" value="0" placeholder="0.65">
                        </div>
                        <div class="form-group">
                            <label for="status">Estado</label>
                            <select id="status">
                                <option value="open">Abierta</option>
                                <option value="closed">Cerrada</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: var(--space-16);">
                        <label for="thesis">Tesis de la Operación</label>
                        <textarea id="thesis" placeholder="¿Por qué entraste en esta operación? ¿Cuál es tu análisis?"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="notes">Notas</label>
                        <textarea id="notes" placeholder="Notas adicionales, emociones, aprendizajes..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top: var(--space-16);">Guardar Operación</button>
                </form>
            </div>
        </div>

        <div id="trades" class="tab-content">
            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-20);">
                    <h2 style="font-size: var(--font-size-xl);">Historial de Operaciones</h2>
                    <button class="btn btn-secondary btn-small" onclick="exportTrades()">Exportar CSV</button>
                </div>
                <div class="filter-bar">
                    <select id="filter-status" onchange="filterTrades()">
                        <option value="all">Todos los estados</option>
                        <option value="open">Abiertas</option>
                        <option value="closed">Cerradas</option>
                    </select>
                    <select id="filter-type" onchange="filterTrades()">
                        <option value="all">Todos los tipos</option>
                        <option value="call">Calls</option>
                        <option value="put">Puts</option>
                    </select>
                    <select id="filter-strategy" onchange="filterTrades()">
                        <option value="all">Todas las estrategias</option>
                        <option value="long-call">Long Call</option>
                        <option value="long-put">Long Put</option>
                        <option value="short-call">Short Call</option>
                        <option value="short-put">Short Put</option>
                        <option value="vertical">Vertical Spread</option>
                        <option value="iron-condor">Iron Condor</option>
                    </select>
                </div>
                <div id="trades-list"></div>
            </div>
        </div>

        <div id="analytics" class="tab-content">
            <div class="card">
                <h2 style="margin-bottom: var(--space-20); font-size: var(--font-size-xl);">Estadísticas de Trading</h2>
                <div class="stats-grid" id="stats-grid"></div>
            </div>
        </div>
    </div>

    <script>
        let trades = [];

        function loadTrades() {
            const saved = JSON.parse(window.localStorage.getItem('optionTrades') || '[]');
            trades = saved;
        }

        function saveTrades() {
            window.localStorage.setItem('optionTrades', JSON.stringify(trades));
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');

            if (tabName === 'trades') {
                renderTrades();
            } else if (tabName === 'analytics') {
                renderAnalytics();
            }
        }

        document.getElementById('tradeForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const trade = {
                id: Date.now(),
                ticker: document.getElementById('ticker').value.toUpperCase(),
                optionType: document.getElementById('option-type').value,
                strategy: document.getElementById('strategy').value,
                strike: parseFloat(document.getElementById('strike').value),
                expiry: document.getElementById('expiry').value,
                contracts: parseInt(document.getElementById('contracts').value),
                entryPrice: parseFloat(document.getElementById('entry-price').value),
                entryDate: document.getElementById('entry-date').value,
                exitPrice: document.getElementById('exit-price').value ? parseFloat(document.getElementById('exit-price').value) : null,
                exitDate: document.getElementById('exit-date').value || null,
                fees: parseFloat(document.getElementById('fees').value) || 0,
                status: document.getElementById('status').value,
                thesis: document.getElementById('thesis').value,
                notes: document.getElementById('notes').value
            };

            trades.push(trade);
            saveTrades();

            this.reset();
            document.getElementById('entry-date').valueAsDate = new Date();
            
            alert('✅ Operación guardada exitosamente');
        });

        function renderTrades() {
            const container = document.getElementById('trades-list');
            
            if (trades.length === 0) {
                container.innerHTML = '<div class="empty-state">No hay operaciones registradas aún. ¡Comienza registrando tu primera operación!</div>';
                return;
            }

            const filteredTrades = getFilteredTrades();

            if (filteredTrades.length === 0) {
                container.innerHTML = '<div class="empty-state">No hay operaciones que coincidan con los filtros seleccionados.</div>';
                return;
            }

            const tableHTML = `
                <table class="trades-table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Ticker</th>
                            <th>Tipo</th>
                            <th>Strike</th>
                            <th>Exp.</th>
                            <th>Contratos</th>
                            <th>Entrada</th>
                            <th>Salida</th>
                            <th>P&amp;L</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filteredTrades.map(trade => {
                            const pnl = calculatePnL(trade);
                            const pnlClass = pnl > 0 ? 'profit' : (pnl < 0 ? 'loss' : '');
                            const pnlText = pnl !== null ? `$${pnl.toFixed(2)}` : '-';

                            return `
                                <tr>
                                    <td>${trade.entryDate}</td>
                                    <td><strong>${trade.ticker}</strong></td>
                                    <td><span class="badge badge-${trade.optionType}">${trade.optionType.toUpperCase()}</span></td>
                                    <td>$${trade.strike.toFixed(2)}</td>
                                    <td>${trade.expiry}</td>
                                    <td>${trade.contracts}</td>
                                    <td>$${trade.entryPrice.toFixed(2)}</td>
                                    <td>${trade.exitPrice ? '$' + trade.exitPrice.toFixed(2) : '-'}</td>
                                    <td class="${pnlClass}">${pnlText}</td>
                                    <td><span class="badge badge-${trade.status}">${trade.status === 'open' ? 'Abierta' : 'Cerrada'}</span></td>
                                    <td>
                                        <div class="action-buttons">
                                            <button class="btn btn-secondary btn-small" onclick="viewTradeDetails(${trade.id})">Ver</button>
                                            <button class="btn btn-secondary btn-small" onclick="deleteTrade(${trade.id})">Eliminar</button>
                                        </div>
                                    </td>
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;

            container.innerHTML = tableHTML;
        }

        function getFilteredTrades() {
            const statusFilter = document.getElementById('filter-status').value;
            const typeFilter = document.getElementById('filter-type').value;
            const strategyFilter = document.getElementById('filter-strategy').value;

            return trades.filter(trade => {
                if (statusFilter !== 'all' && trade.status !== statusFilter) return false;
                if (typeFilter !== 'all' && trade.optionType !== typeFilter) return false;
                if (strategyFilter !== 'all' && trade.strategy !== strategyFilter) return false;
                return true;
            });
        }

        function filterTrades() {
            renderTrades();
        }

        function calculatePnL(trade) {
            if (!trade.exitPrice) return null;
            
            const multiplier = 100;
            const profit = (trade.exitPrice - trade.entryPrice) * trade.contracts * multiplier;
            return profit - trade.fees;
        }

        function renderAnalytics() {
            const container = document.getElementById('stats-grid');

            if (trades.length === 0) {
                container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;">No hay datos suficientes para mostrar estadísticas.</div>';
                return;
            }

            const closedTrades = trades.filter(t => t.status === 'closed' && t.exitPrice);
            const totalTrades = trades.length;
            const openTrades = trades.filter(t => t.status === 'open').length;
            
            let totalPnL = 0;
            let winners = 0;
            let losers = 0;
            let totalWinAmount = 0;
            let totalLossAmount = 0;

            closedTrades.forEach(trade => {
                const pnl = calculatePnL(trade);
                if (pnl !== null) {
                    totalPnL += pnl;
                    if (pnl > 0) {
                        winners++;
                        totalWinAmount += pnl;
                    } else if (pnl < 0) {
                        losers++;
                        totalLossAmount += Math.abs(pnl);
                    }
                }
            });

            const winRate = closedTrades.length > 0 ? ((winners / closedTrades.length) * 100).toFixed(1) : 0;
            const avgWin = winners > 0 ? (totalWinAmount / winners).toFixed(2) : 0;
            const avgLoss = losers > 0 ? (totalLossAmount / losers).toFixed(2) : 0;
            const profitFactor = totalLossAmount > 0 ? (totalWinAmount / totalLossAmount).toFixed(2) : '-';

            const pnlClass = totalPnL > 0 ? 'profit' : (totalPnL < 0 ? 'loss' : '');

            container.innerHTML = `
                <div class="stat-card">
                    <div class="stat-label">Total de Operaciones</div>
                    <div class="stat-value">${totalTrades}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Operaciones Abiertas</div>
                    <div class="stat-value">${openTrades}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Operaciones Cerradas</div>
                    <div class="stat-value">${closedTrades.length}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">P&amp;L Total</div>
                    <div class="stat-value ${pnlClass}">$${totalPnL.toFixed(2)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Win Rate</div>
                    <div class="stat-value">${winRate}%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Ganadoras / Perdedoras</div>
                    <div class="stat-value">${winners} / ${losers}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Ganancia Promedio</div>
                    <div class="stat-value profit">$${avgWin}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pérdida Promedio</div>
                    <div class="stat-value loss">$${avgLoss}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Profit Factor</div>
                    <div class="stat-value">${profitFactor}</div>
                </div>
            `;
        }

        function viewTradeDetails(id) {
            const trade = trades.find(t => t.id === id);
            if (!trade) return;

            const pnl = calculatePnL(trade);
            const pnlText = pnl !== null ? `$${pnl.toFixed(2)}` : 'N/A';

            let details = `
                📊 DETALLES DE LA OPERACIÓN\n
                Ticker: ${trade.ticker}
                Tipo: ${trade.optionType.toUpperCase()}
                Estrategia: ${trade.strategy || 'N/A'}
                Strike: $${trade.strike.toFixed(2)}
                Expiración: ${trade.expiry}
                Contratos: ${trade.contracts}
                
                Entrada: $${trade.entryPrice.toFixed(2)} (${trade.entryDate})
                Salida: ${trade.exitPrice ? '$' + trade.exitPrice.toFixed(2) + ' (' + trade.exitDate + ')' : 'N/A'}
                Comisiones: $${trade.fees.toFixed(2)}
                P&L: ${pnlText}
                Estado: ${trade.status === 'open' ? 'Abierta' : 'Cerrada'}
                
                Tesis:\n${trade.thesis || 'N/A'}
                
                Notas:\n${trade.notes || 'N/A'}
            `;

            alert(details);
        }

        function deleteTrade(id) {
            if (confirm('¿Estás seguro de que quieres eliminar esta operación?')) {
                trades = trades.filter(t => t.id !== id);
                saveTrades();
                renderTrades();
                alert('✅ Operación eliminada');
            }
        }

        function exportTrades() {
            if (trades.length === 0) {
                alert('No hay operaciones para exportar');
                return;
            }

            let csv = 'Fecha Entrada,Ticker,Tipo,Estrategia,Strike,Expiración,Contratos,Precio Entrada,Precio Salida,Comisiones,P&L,Estado,Tesis,Notas\n';

            trades.forEach(trade => {
                const pnl = calculatePnL(trade);
                const row = [
                    trade.entryDate,
                    trade.ticker,
                    trade.optionType,
                    trade.strategy || '',
                    trade.strike,
                    trade.expiry,
                    trade.contracts,
                    trade.entryPrice,
                    trade.exitPrice || '',
                    trade.fees,
                    pnl !== null ? pnl.toFixed(2) : '',
                    trade.status,
                    `"${trade.thesis.replace(/"/g, '""')}"`,
                    `"${trade.notes.replace(/"/g, '""')}"`
                ];
                csv += row.join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `options_trades_${new Date().toISOString().split('T')[0]}.csv`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        loadTrades();
        document.getElementById('entry-date').valueAsDate = new Date();
    </script>
</body>
</html>
