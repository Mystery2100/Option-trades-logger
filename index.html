<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyStery Analytics</title>
    <style>
        :root {
            --color-cream-50: #FCFCF9;
            --color-cream-100: #FFFFFD;
            --color-gray-200: #F5F5F5;
            --color-gray-300: #A7A9A9;
            --color-gray-400: #777C7C;
            --color-slate-500: #626C71;
            --color-brown-600: #5E5240;
            --color-charcoal-700: #1F2121;
            --color-charcoal-800: #262828;
            --color-slate-900: #13343B;
            --color-teal-300: #32B8C6;
            --color-teal-400: #2DA6B2;
            --color-teal-500: #21808D;
            --color-teal-600: #1D747F;
            --color-teal-700: #1A6872;
            --color-teal-800: #2996A1;
            --color-red-400: #FF5459;
            --color-red-500: #C0152F;
            --color-orange-400: #E68161;
            --color-orange-500: #A84B2F;
            --color-purple: #9333EA;
            --color-green-500: #22C55E;
            --color-brown-600-rgb: 94,82,64;
            --color-teal-500-rgb: 33,128,141;
            --color-slate-900-rgb: 19,52,59;
            --color-slate-500-rgb: 98,108,113;
            --color-red-500-rgb: 192,21,47;
            --color-red-400-rgb: 255,84,89;
            --color-orange-500-rgb: 168,75,47;
            --color-orange-400-rgb: 230,129,97;
            --color-background: var(--color-cream-50);
            --color-surface: var(--color-cream-100);
            --color-text: var(--color-slate-900);
            --color-text-secondary: var(--color-slate-500);
            --color-primary: var(--color-teal-500);
            --color-primary-hover: var(--color-teal-600);
            --color-secondary: rgba(var(--color-brown-600-rgb),0.12);
            --color-secondary-hover: rgba(var(--color-brown-600-rgb),0.2);
            --color-border: rgba(var(--color-brown-600-rgb),0.2);
            --color-btn-primary-text: var(--color-cream-50);
            --color-card-border: rgba(var(--color-brown-600-rgb),0.12);
            --color-error: var(--color-red-500);
            --color-success: var(--color-green-500);
            --color-warning: var(--color-orange-500);
            --color-focus-ring: rgba(var(--color-teal-500-rgb),0.4);
            --focus-outline: 2px solid var(--color-primary);
            --status-bg-opacity: 0.15;
            --status-border-opacity: 0.25;
            --color-success-rgb: 34,197,94;
            --color-error-rgb: 192,21,47;
            --color-info-rgb: 98,108,113;
            --font-family-base: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-size-xs: 11px;
            --font-size-sm: 12px;
            --font-size-base: 14px;
            --font-size-lg: 16px;
            --font-size-xl: 18px;
            --font-size-2xl: 20px;
            --font-size-3xl: 24px;
            --font-weight-normal: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 550;
            --font-weight-bold: 600;
            --space-4: 4px;
            --space-8: 8px;
            --space-12: 12px;
            --space-16: 16px;
            --space-20: 20px;
            --space-24: 24px;
            --radius-base: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --color-gray-400-rgb: 119,124,124;
                --color-teal-300-rgb: 50,184,198;
                --color-gray-300-rgb: 167,169,169;
                --color-gray-200-rgb: 245,245,245;
                --color-background: var(--color-charcoal-700);
                --color-surface: var(--color-charcoal-800);
                --color-text: var(--color-gray-200);
                --color-text-secondary: rgba(var(--color-gray-300-rgb),0.7);
                --color-primary: var(--color-teal-300);
                --color-primary-hover: var(--color-teal-400);
                --color-secondary: rgba(var(--color-gray-400-rgb),0.15);
                --color-secondary-hover: rgba(var(--color-gray-400-rgb),0.25);
                --color-border: rgba(var(--color-gray-400-rgb),0.3);
                --color-error: var(--color-red-400);
                --color-success: var(--color-teal-300);
                --color-focus-ring: rgba(var(--color-teal-300-rgb),0.4);
                --color-btn-primary-text: var(--color-slate-900);
                --color-card-border: rgba(var(--color-gray-400-rgb),0.2);
                --color-success-rgb: 50,184,198;
                --color-error-rgb: 255,84,89;
                --color-info-rgb: 167,169,169;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-family-base); font-size: var(--font-size-base); background-color: var(--color-background); color: var(--color-text); line-height: 1.5; }
        .container { max-width: 1200px; margin: 0 auto; padding: var(--space-24); }
        header { margin-bottom: var(--space-24); }
        .header-title { font-size: var(--font-size-3xl); font-weight: var(--font-weight-bold); margin-bottom: var(--space-8); color: var(--color-text); }
        .header-title span { color: var(--color-purple); }
        .subtitle { color: var(--color-text-secondary); font-size: var(--font-size-base); }
        .tabs { display: flex; gap: var(--space-8); margin-bottom: var(--space-24); border-bottom: 2px solid var(--color-border); }
        .tab { padding: var(--space-12) var(--space-24); background: none; border: none; font-size: var(--font-size-base); font-weight: var(--font-weight-medium); color: var(--color-text-secondary); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .tab:hover { color: var(--color-text); }
        .tab.active { color: var(--color-primary); border-bottom-color: var(--color-primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: var(--color-surface); border: 1px solid var(--color-card-border); border-radius: var(--radius-lg); padding: var(--space-24); margin-bottom: var(--space-24); box-shadow: var(--shadow-sm); }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: var(--space-16); margin-bottom: var(--space-16); }
        .form-group { display: flex; flex-direction: column; gap: var(--space-8); }
        label { font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); color: var(--color-text); }
        .label-hint { font-size: var(--font-size-xs); color: var(--color-text-secondary); font-weight: var(--font-weight-normal); }
        input, select, textarea { padding: var(--space-8) var(--space-12); border: 1px solid var(--color-border); border-radius: var(--radius-base); font-size: var(--font-size-base); background: var(--color-surface); color: var(--color-text); font-family: var(--font-family-base); }
        input:focus, select:focus, textarea:focus { outline: var(--focus-outline); border-color: var(--color-primary); }
        textarea { min-height: 80px; resize: vertical; }
        .section-divider { border: none; border-top: 1px solid var(--color-card-border); margin: var(--space-20) 0; }
        .section-label { font-size: var(--font-size-sm); font-weight: var(--font-weight-semibold); color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--space-12); }
        .btn { padding: var(--space-12) var(--space-24); border: none; border-radius: var(--radius-base); font-size: var(--font-size-base); font-weight: var(--font-weight-medium); cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--color-primary); color: var(--color-btn-primary-text); }
        .btn-primary:hover { background: var(--color-primary-hover); }
        .btn-secondary { background: var(--color-secondary); color: var(--color-text); }
        .btn-secondary:hover { background: var(--color-secondary-hover); }
        .btn-small { padding: var(--space-4) var(--space-12); font-size: var(--font-size-sm); }
        .trades-table { width: 100%; border-collapse: collapse; margin-top: var(--space-16); }
        .trades-table th { text-align: left; padding: var(--space-12); border-bottom: 2px solid var(--color-border); font-weight: var(--font-weight-semibold); font-size: var(--font-size-sm); color: var(--color-text-secondary); }
        .trades-table td { padding: var(--space-12); border-bottom: 1px solid var(--color-card-border); font-size: var(--font-size-sm); }
        .trades-table tr:hover { background: var(--color-secondary); }
        .badge { display: inline-block; padding: var(--space-4) var(--space-8); border-radius: var(--radius-base); font-size: var(--font-size-xs); font-weight: var(--font-weight-medium); }
        .badge-call { background: rgba(var(--color-success-rgb),var(--status-bg-opacity)); color: var(--color-success); border: 1px solid rgba(var(--color-success-rgb),var(--status-border-opacity)); }
        .badge-put { background: rgba(var(--color-error-rgb),var(--status-bg-opacity)); color: var(--color-error); border: 1px solid rgba(var(--color-error-rgb),var(--status-border-opacity)); }
        .badge-open { background: rgba(var(--color-info-rgb),var(--status-bg-opacity)); color: var(--color-text-secondary); border: 1px solid rgba(var(--color-info-rgb),var(--status-border-opacity)); }
        .badge-closed { background: var(--color-secondary); color: var(--color-text-secondary); border: 1px solid var(--color-border); }
        .profit { color: var(--color-success); font-weight: var(--font-weight-semibold); }
        .loss { color: var(--color-error); font-weight: var(--font-weight-semibold); }
        .duration-day { background: rgba(var(--color-orange-500-rgb),0.1); color: var(--color-orange-500); border: 1px solid rgba(var(--color-orange-500-rgb),0.25); }
        .duration-swing { background: rgba(var(--color-success-rgb),0.1); color: var(--color-success); border: 1px solid rgba(var(--color-success-rgb),0.25); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--space-16); }
        .stat-card { background: var(--color-surface); border: 1px solid var(--color-card-border); border-radius: var(--radius-lg); padding: var(--space-20); text-align: center; }
        .stat-label { font-size: var(--font-size-sm); color: var(--color-text-secondary); margin-bottom: var(--space-8); }
        .stat-value { font-size: var(--font-size-2xl); font-weight: var(--font-weight-bold); color: var(--color-text); }
        .action-buttons { display: flex; gap: var(--space-8); flex-wrap: wrap; }
        .empty-state { text-align: center; padding: var(--space-24); color: var(--color-text-secondary); }
        .filter-bar { display: flex; gap: var(--space-12); margin-bottom: var(--space-16); flex-wrap: wrap; }
        .filter-bar select { min-width: 140px; }
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1f2121; color: #fff; padding: 12px 24px; border-radius: var(--radius-lg); font-size: var(--font-size-sm); z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        #import-input { display: none; }
        .edit-indicator { font-size: var(--font-size-sm); color: var(--color-info); font-weight: var(--font-weight-medium); }
        .trade-detail { max-width: 500px; margin: 20px auto; background: var(--color-surface); border-radius: var(--radius-lg); padding: var(--space-24); box-shadow: var(--shadow-md); font-family: var(--font-family-base); }
        .trade-detail h2 { margin-bottom: var(--space-16); color: var(--color-primary); }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: var(--space-8); padding: var(--space-8) 0; border-bottom: 1px solid var(--color-border); }
        .detail-label { font-weight: var(--font-weight-medium); color: var(--color-text-secondary); }
        .detail-value { font-weight: var(--font-weight-semibold); }
        .detail-profit { color: var(--color-success); }
        .detail-loss { color: var(--color-error); }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr 1fr; } .stats-grid { grid-column: 1fr 1fr; } .trades-table { font-size: var(--font-size-xs); } .trades-table th, .trades-table td { padding: var(--space-8); } }
        @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } .action-buttons { flex-direction: column; width: 100%; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1 class="header-title">Options Trade Logger <span>MyStery Analytics</span></h1>
        <p class="subtitle">Track and analyze your directional options trades</p>
    </header>

    <div class="tabs">
        <button class="tab active" id="tab-new-trade" onclick="switchTab('new-trade')">New Trade</button>
        <button class="tab" id="tab-trades" onclick="switchTab('trades')">My Trades</button>
        <button class="tab" id="tab-analytics" onclick="switchTab('analytics')">Analytics</button>
    </div>

    <div id="new-trade" class="tab-content active">
        <div class="card">
            <h2 style="margin-bottom:var(--space-20);font-size:var(--font-size-xl);">Log New Trade <span class="edit-indicator" id="edit-indicator"></span></h2>
            <form id="tradeForm">
                <p class="section-label">Trade Setup</p>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="ticker">Ticker *</label>
                        <input type="text" id="ticker" required placeholder="AAPL, TSLA, SPY...">
                    </div>
                    <div class="form-group">
                        <label for="option-type">Option Type *</label>
                        <select id="option-type" required onchange="updateDeltaPlaceholder()">
                            <option value="">Select...</option>
                            <option value="call">Long Call</option>
                            <option value="put">Long Put</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="strike">Strike Price *</label>
                        <input type="number" id="strike" step="0.01" required placeholder="150.00">
                    </div>
                    <div class="form-group">
                        <label for="expiry">Expiration Date *</label>
                        <input type="date" id="expiry" required>
                    </div>
                    <div class="form-group">
                        <label for="contracts">Contracts *</label>
                        <input type="number" id="contracts" min="1" required placeholder="1">
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="open">Open</option>
                            <option value="closed">Closed</option>
                        </select>
                    </div>
                </div>

                <hr class="section-divider">
                <p class="section-label">Entry</p>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="entry-date">Entry Date *</label>
                        <input type="date" id="entry-date" required>
                    </div>
                    <div class="form-group">
                        <label for="entry-price">Option Entry Price *</label>
                        <input type="number" id="entry-price" step="0.01" required placeholder="2.50">
                    </div>
                    <div class="form-group">
                        <label for="stock-price-entry">Stock Price at Entry *</label>
                        <input type="number" id="stock-price-entry" step="0.01" required placeholder="148.50">
                    </div>
                    <div class="form-group">
                        <label for="fees">Commissions</label>
                        <input type="number" id="fees" step="0.01" value="0" placeholder="0.65">
                    </div>
                </div>

                <hr class="section-divider">
                <p class="section-label">Greeks at Entry</p>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="delta">Delta <span class="label-hint">(negative OK for puts)</span></label>
                        <input type="number" id="delta" step="0.01" placeholder="-0.45">
                    </div>
                    <div class="form-group">
                        <label for="theta">Theta <span class="label-hint">(daily decay)</span></label>
                        <input type="number" id="theta" step="0.001" placeholder="-0.05">
                    </div>
                </div>

                <hr class="section-divider">
                <p class="section-label">Risk Management</p>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="stop-loss">Stop Loss / Invalidation Level <span class="label-hint">(stock price)</span></label>
                        <input type="number" id="stop-loss" step="0.01" placeholder="142.00">
                    </div>
                </div>

                <hr class="section-divider">
                <p class="section-label">Exit</p>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="exit-price">Option Exit Price</label>
                        <input type="number" id="exit-price" step="0.01" placeholder="3.80">
                    </div>
                    <div class="form-group">
                        <label for="exit-date">Exit Date</label>
                        <input type="date" id="exit-date">
                    </div>
                </div>

                <hr class="section-divider">
                <p class="section-label">Analysis</p>
                <div class="form-group" style="margin-bottom:var(--space-16);">
                    <label for="thesis">Trade Thesis</label>
                    <textarea id="thesis" placeholder="Why are you entering this trade? What is your technical or fundamental setup?"></textarea>
                </div>
                <div class="form-group">
                    <label for="notes">Notes / Lessons Learned</label>
                    <textarea id="notes" placeholder="Additional notes, emotions, key learnings after closing..."></textarea>
                </div>

                <div style="display:flex;gap:var(--space-8);margin-top:var(--space-20)">
                    <button type="submit" class="btn btn-primary" id="save-btn">Save Trade</button>
                    <button type="button" class="btn btn-secondary" onclick="cancelEdit()">Cancel Edit</button>
                </div>
            </form>
        </div>
    </div>

    <div id="trades" class="tab-content">
        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-20)">
                <h2 style="font-size:var(--font-size-xl);">Trade History</h2>
                <div style="display:flex;gap:var(--space-8)">
                    <input type="file" id="import-input" accept=".csv" style="display:none" onchange="importCSV(event)">
                    <button class="btn btn-secondary btn-small" onclick="document.getElementById('import-input').click()">Import CSV</button>
                    <button class="btn btn-secondary btn-small" onclick="exportTrades()">Export CSV</button>
                </div>
            </div>
            <div class="filter-bar">
                <select id="filter-status" onchange="filterTrades()">
                    <option value="all">All statuses</option>
                    <option value="open">Open</option>
                    <option value="closed">Closed</option>
                </select>
                <select id="filter-type" onchange="filterTrades()">
                    <option value="all">Calls & Puts</option>
                    <option value="call">Long Calls only</option>
                    <option value="put">Long Puts only</option>
                </select>
            </div>
            <div id="trades-list"></div>
        </div>
    </div>

    <div id="analytics" class="tab-content">
        <div class="card">
            <h2 style="margin-bottom:var(--space-20);font-size:var(--font-size-xl);">Trading Statistics</h2>
            <div class="stats-grid" id="stats-grid"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
var trades = [];
var editingId = null;

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function loadTrades() {
    try {
        var saved = localStorage.getItem('mystery_trades');
        trades = saved ? JSON.parse(saved) : [];
    } catch(e) { trades = []; }
}

function saveTrades() {
    localStorage.setItem('mystery_trades', JSON.stringify(trades));
}

function updateDeltaPlaceholder() {
    var type = document.getElementById('option-type').value;
    var deltaInput = document.getElementById('delta');
    if (type === 'call') {
        deltaInput.placeholder = '0.45';
    } else if (type === 'put') {
        deltaInput.placeholder = '-0.45';
    } else {
        deltaInput.placeholder = 'Delta';
    }
}

function switchTab(tabName) {
    document.querySelectorAll('.tab').forEach(function(tab) { tab.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(content) { content.classList.remove('active'); });

    document.getElementById('tab-' + tabName).classList.add('active');
    document.getElementById(tabName).classList.add('active');

    if (tabName === 'trades') renderTrades();
    if (tabName === 'analytics') renderAnalytics();

    if (editingId !== null) cancelEdit();
}

function cancelEdit() {
    editingId = null;
    document.getElementById('edit-indicator').textContent = '';
    document.getElementById('save-btn').textContent = 'Save Trade';
    document.getElementById('tradeForm').reset();
    document.getElementById('entry-date').valueAsDate = new Date();
}

document.getElementById('tradeForm').addEventListener('submit', function(e) {
    e.preventDefault();

    var trade = {
        id: editingId || Date.now(),
        ticker: document.getElementById('ticker').value.toUpperCase(),
        optionType: document.getElementById('option-type').value,
        strike: parseFloat(document.getElementById('strike').value),
        expiry: document.getElementById('expiry').value,
        contracts: parseInt(document.getElementById('contracts').value),
        entryPrice: parseFloat(document.getElementById('entry-price').value),
        entryDate: document.getElementById('entry-date').value,
        stockPriceEntry: document.getElementById('stock-price-entry').value ? parseFloat(document.getElementById('stock-price-entry').value) : null,
        fees: parseFloat(document.getElementById('fees').value) || 0,
        delta: document.getElementById('delta').value ? parseFloat(document.getElementById('delta').value) : null,
        theta: document.getElementById('theta').value ? parseFloat(document.getElementById('theta').value) : null,
        stopLoss: document.getElementById('stop-loss').value ? parseFloat(document.getElementById('stop-loss').value) : null,
        exitPrice: document.getElementById('exit-price').value ? parseFloat(document.getElementById('exit-price').value) : null,
        exitDate: document.getElementById('exit-date').value || null,
        status: document.getElementById('status').value,
        thesis: document.getElementById('thesis').value,
        notes: document.getElementById('notes').value
    };

    if (editingId !== null) {
        for (var i = 0; i < trades.length; i++) {
            if (trades[i].id === editingId) {
                trades[i] = trade;
                break;
            }
        }
        showToast('Trade updated!');
    } else {
        trades.push(trade);
        showToast('Trade saved!');
    }

    saveTrades();
    cancelEdit();
    if (document.getElementById('trades').classList.contains('active')) renderTrades();
});

function calculatePnL(trade) {
    if (!trade.exitPrice) return null;
    return (trade.exitPrice - trade.entryPrice) * trade.contracts * 100 - trade.fees;
}

function calculateDuration(entryDate, exitDate) {
    if (!exitDate) return 'Open';
    var entry = new Date(entryDate);
    var exit = new Date(exitDate);
    var days = Math.floor((exit - entry) / (1000 * 60 * 60 * 24));
    return days <= 1 ? 'Day' : days + 'd Swing';
}

function getFilteredTrades() {
    var statusFilter = document.getElementById('filter-status').value;
    var typeFilter = document.getElementById('filter-type').value;
    return trades.filter(function(trade) {
        if (statusFilter !== 'all' && trade.status !== statusFilter) return false;
        if (typeFilter !== 'all' && trade.optionType !== typeFilter) return false;
        return true;
    });
}

function renderTrades() {
    var container = document.getElementById('trades-list');
    if (trades.length === 0) {
        container.innerHTML = '<div class="empty-state">No trades logged yet. Start by logging your first trade!</div>';
        return;
    }
    var filtered = getFilteredTrades();
    if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state">No trades match the selected filters.</div>';
        return;
    }

    var html = '<table class="trades-table"><thead><tr>' +
        '<th>Date</th><th>Ticker</th><th>Type</th><th>Strike</th><th>Exp</th>' +
        '<th>Qty</th><th>Stock</th><th>Entry</th><th>Exit</th><th>Delta</th>' +
        '<th>Theta</th><th>Stop</th><th>P&L</th><th>Duration</th><th>Status</th><th>Actions</th>' +
        '</tr></thead><tbody>';

    for (var i = 0; i < filtered.length; i++) {
        var trade = filtered[i];
        var pnl = calculatePnL(trade);
        var pnlClass = pnl !== null ? (pnl > 0 ? 'profit' : 'loss') : '';
        var pnlText = pnl !== null ? '$' + pnl.toFixed(2) : '-';
        var duration = calculateDuration(trade.entryDate, trade.exitDate);
        var durationClass = duration === 'Open' ? 'badge-open' : (duration.includes('Day') ? 'duration-day' : 'duration-swing');

        html += '<tr>' +
            '<td>' + trade.entryDate + '</td>' +
            '<td><strong>' + trade.ticker + '</strong></td>' +
            '<td><span class="badge badge-' + trade.optionType + '">' + (trade.optionType === 'call' ? 'CALL' : 'PUT') + '</span></td>' +
            '<td>$' + trade.strike.toFixed(2) + '</td>' +
            '<td>' + trade.expiry + '</td>' +
            '<td>' + trade.contracts + '</td>' +
            '<td>' + (trade.stockPriceEntry ? '$' + trade.stockPriceEntry.toFixed(2) : '-') + '</td>' +
            '<td>$' + trade.entryPrice.toFixed(2) + '</td>' +
            '<td>' + (trade.exitPrice ? '$' + trade.exitPrice.toFixed(2) : '-') + '</td>' +
            '<td>' + (trade.delta !== null ? trade.delta : '-') + '</td>' +
            '<td>' + (trade.theta !== null ? trade.theta : '-') + '</td>' +
            '<td>' + (trade.stopLoss ? '$' + trade.stopLoss.toFixed(2) : '-') + '</td>' +
            '<td class="' + pnlClass + '">' + pnlText + '</td>' +
            '<td><span class="badge ' + durationClass + '">' + duration + '</span></td>' +
            '<td><span class="badge badge-' + trade.status + '">' + (trade.status === 'open' ? 'Open' : 'Closed') + '</span></td>' +
            '<td><div class="action-buttons">' +
                '<button class="btn btn-secondary btn-small" onclick="editTrade(' + trade.id + ')">Edit</button>' +
                '<button class="btn btn-secondary btn-small" onclick="viewDetails(' + trade.id + ')">Details</button>' +
                '<button class="btn btn-secondary btn-small" onclick="deleteTrade(' + trade.id + ')">Delete</button>' +
            '</div></td>' +
        '</tr>';
    }
    html += '</tbody></table>';
    container.innerHTML = html;
}

function filterTrades() {
    renderTrades();
}

function editTrade(id) {
    var trade = trades.find(function(t) { return t.id === id; });
    if (!trade) return;

    editingId = id;
    document.getElementById('edit-indicator').textContent = '(Editing ID: ' + id + ')';
    document.getElementById('save-btn').textContent = 'Update Trade';

    document.getElementById('ticker').value = trade.ticker;
    document.getElementById('option-type').value = trade.optionType;
    document.getElementById('strike').value = trade.strike;
    document.getElementById('expiry').value = trade.expiry;
    document.getElementById('contracts').value = trade.contracts;
    document.getElementById('status').value = trade.status;
    document.getElementById('entry-date').value = trade.entryDate;
    document.getElementById('entry-price').value = trade.entryPrice;
    document.getElementById('stock-price-entry').value = trade.stockPriceEntry || '';
    document.getElementById('fees').value = trade.fees;
    document.getElementById('delta').value = trade.delta !== null ? trade.delta : '';
    document.getElementById('theta').value = trade.theta !== null ? trade.theta : '';
    document.getElementById('stop-loss').value = trade.stopLoss !== null ? trade.stopLoss : '';
    document.getElementById('exit-price').value = trade.exitPrice !== null ? trade.exitPrice : '';
    document.getElementById('exit-date').value = trade.exitDate || '';
    document.getElementById('thesis').value = trade.thesis || '';
    document.getElementById('notes').value = trade.notes || '';

    updateDeltaPlaceholder();
    switchTab('new-trade');
}

function viewDetails(id) {
    var trade = trades.find(function(t) { return t.id === id; });
    if (!trade) return;
    var pnl = calculatePnL(trade);
    var pnlClass = pnl !== null ? (pnl > 0 ? 'detail-profit' : 'detail-loss') : '';
    var pnlText = pnl !== null ? '$' + pnl.toFixed(2) : 'N/A';
    var duration = calculateDuration(trade.entryDate, trade.exitDate);
    var durationClass = duration === 'Open' ? 'badge-open' : (duration.includes('Day') ? 'duration-day' : 'duration-swing');

    var details = '<div class="trade-detail">' +
        '<h2>📊 Trade Details <span style="font-size:0.8em;color:var(--color-text-secondary)">ID: ' + trade.id + '</span></h2>' +
        '<div class="detail-row"><span class="detail-label">Ticker:</span><span class="detail-value"><strong>' + trade.ticker + '</strong></span></div>' +
        '<div class="detail-row"><span class="detail-label">Type:</span><span class="detail-value"><span class="badge badge-' + trade.optionType + '">' + (trade.optionType === 'call' ? 'Long Call' : 'Long Put') + '</span></span></div>' +
        '<div class="detail-row"><span class="detail-label">Strike:</span><span class="detail-value">$' + trade.strike.toFixed(2) + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">Expiration:</span><span class="detail-value">' + trade.expiry + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">Contracts:</span><span class="detail-value">' + trade.contracts + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">Entry:</span><span class="detail-value">$' + trade.entryPrice.toFixed(2) + ' (' + trade.entryDate + ')</span></div>' +
        '<div class="detail-row"><span class="detail-label">Stock Entry:</span><span class="detail-value">$' + (trade.stockPriceEntry ? trade.stockPriceEntry.toFixed(2) : 'N/A') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">Exit:</span><span class="detail-value">' + (trade.exitPrice ? '$' + trade.exitPrice.toFixed(2) + ' (' + trade.exitDate + ')' : 'Open') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">P&L:</span><span class="detail-value ' + pnlClass + '">' + pnlText + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">Duration:</span><span class="detail-value"><span class="badge ' + durationClass + '">' + duration + '</span></span></div>' +
        '<div class="detail-row"><span class="detail-label">Delta:</span><span class="detail-value">' + (trade.delta !== null ? trade.delta : 'N/A') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">Theta:</span><span class="detail-value">' + (trade.theta !== null ? trade.theta : 'N/A') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">Stop Loss:</span><span class="detail-value">' + (trade.stopLoss ? '$' + trade.stopLoss.toFixed(2) : 'N/A') + '</span></div>' +
        '<div class="detail-row"><span class="detail-label">Status:</span><span class="detail-value"><span class="badge badge-' + trade.status + '">' + (trade.status === 'open' ? 'Open' : 'Closed') + '</span></span></div>' +
        '<hr style="margin: var(--space-16) 0;">' +
        '<div style="margin-top: var(--space-16);"><strong>Thesis:</strong><div style="margin-top:var(--space-8);padding:var(--space-12);background:var(--color-secondary);border-radius:var(--radius-base);">' + (trade.thesis || 'N/A') + '</div></div>' +
        '<div style="margin-top: var(--space-16);"><strong>Notes:</strong><div style="margin-top:var(--space-8);padding:var(--space-12);background:var(--color-secondary);border-radius:var(--radius-base);">' + (trade.notes || 'N/A') + '</div></div>' +
        '</div>';

    var modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;box-sizing:border-box;';
    modal.innerHTML = details + '<button onclick="this.parentElement.remove()" style="margin-top:var(--space-16);padding:var(--space-12) var(--space-24);background:var(--color-primary);color:var(--color-btn-primary-text);border:none;border-radius:var(--radius-base);font-size:var(--font-size-lg);cursor:pointer;">Close</button>';
    document.body.appendChild(modal);
}

function deleteTrade(id) {
    if (confirm('Are you sure you want to delete this trade?')) {
        trades = trades.filter(function(t) { return t.id !== id; });
        saveTrades();
        renderTrades();
        showToast('Trade deleted.');
    }
}

function importCSV(event) {
    var file = event.target.files[0];
    if (!file) return;

    var reader = new FileReader();
    reader.onload = function(e) {
        var csv = e.target.result;
        var lines = csv.split('\n');
        if (lines.length < 2) { showToast('Invalid CSV'); return; }

        var header = lines[0].split(',');
        var imported = 0, updated = 0, errors = 0;

        for (var i = 1; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) continue;

            var row = parseCSVLine(line);
            if (row.length < 18) { errors++; continue; }

            var trade = {
                id: parseInt(row[0]) || Date.now() + i,
                ticker: row[1].trim().toUpperCase(),
                optionType: row[2].trim().toLowerCase().includes('call') ? 'call' : 'put',
                strike: parseFloat(row[3]) || 0,
                expiry: row[4].trim(),
                contracts: parseInt(row[5]) || 1,
                stockPriceEntry: parseFloat(row[6]) || null,
                entryPrice: parseFloat(row[7]) || 0,
                exitPrice: parseFloat(row[8]) || null,
                exitDate: row[9].trim(),
                fees: parseFloat(row[10]) || 0,
                delta: parseFloat(row[12]) || null,
                theta: parseFloat(row[13]) || null,
                stopLoss: parseFloat(row[14]) || null,
                status: row[15].trim() || 'open',
                thesis: row[16].trim(),
                notes: row[17].trim()
            };

            var found = false;
            for (var j = 0; j < trades.length; j++) {
                if (trades[j].id === trade.id) {
                    trades[j] = trade;
                    updated++;
                    found = true;
                    break;
                }
            }
            if (!found) {
                trades.push(trade);
                imported++;
            }
        }

        saveTrades();
        renderTrades();
        event.target.value = '';
        showToast('Imported: ' + imported + ' new, Updated: ' + updated + ', Errors: ' + errors);
    };
    reader.readAsText(file);
}

function parseCSVLine(line) {
    var result = [];
    var inQuotes = false;
    var field = '';
    for (var i = 0; i < line.length; i++) {
        var char = line[i];
        if (char === '"' && (i === 0 || line[i-1] !== '""')) {
            inQuotes = !inQuotes;
        } else if (char === ',' && !inQuotes) {
            result.push(field);
            field = '';
        } else {
            field += char;
        }
    }
    result.push(field);
    return result;
}

function exportTrades() {
    if (trades.length === 0) { showToast('No trades to export.'); return; }
    var csv = 'ID,Entry Date,Ticker,Type,Strike,Expiration,Contracts,Stock Price Entry,Option Entry,Option Exit,Exit Date,Commissions,PnL,Delta,Theta,Stop Loss,Status,"Thesis","Notes"\n';
    for (var i = 0; i < trades.length; i++) {
        var trade = trades[i];
        var pnl = calculatePnL(trade);
        var thesis = (trade.thesis || '').replace(/"/g, '""');
        var notes = (trade.notes || '').replace(/"/g, '""');
        csv += trade.id + ',' + trade.entryDate + ',' + trade.ticker + ',' +
            (trade.optionType === 'call' ? 'Long Call' : 'Long Put') + ',' +
            trade.strike + ',' + trade.expiry + ',' + trade.contracts + ',' +
            (trade.stockPriceEntry || '') + ',' + trade.entryPrice + ',' +
            (trade.exitPrice || '') + ',' + (trade.exitDate || '') + ',' +
            trade.fees + ',' + (pnl !== null ? pnl.toFixed(2) : '') + ',' +
            (trade.delta !== null ? trade.delta : '') + ',' +
            (trade.theta !== null ? trade.theta : '') + ',' +
            (trade.stopLoss || '') + ',' + trade.status + ',"' + thesis + '","' + notes + '"\n';
    }
    var blob = new Blob([csv], { type: 'text/csv' });
    var url = window.URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'mystery_trades_' + new Date().toISOString().split('T')[0] + '.csv';
    a.click();
    window.URL.revokeObjectURL(url);
}
